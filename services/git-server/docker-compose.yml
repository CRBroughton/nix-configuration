version: '3'

services:
  tailscale-git-server:
    image: tailscale/tailscale:latest
    container_name: tailscale-git-server
    hostname: git-server
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ./tailscale:/var/lib/tailscale:Z
      - ./serve.json:/config/serve.json:ro,Z
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

  git-server:
    image: crbroughton/git-server:latest
    restart: unless-stopped
    container_name: git-server
    network_mode: service:tailscale-git-server
    depends_on:
      - tailscale-git-server
    volumes:
      - ./keys:/git-server/keys:Z
      - ./repos:/git-server/repos:Z

  cgit-server:
    image: emarcs/nginx-cgit
    restart: unless-stopped
    container_name: cgit-server
    network_mode: service:tailscale-git-server
    depends_on:
      - tailscale-git-server
    volumes:
      - ./repos:/srv/git:Z
