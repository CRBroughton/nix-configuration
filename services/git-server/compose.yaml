# Git Server - Self-hosted git with cgit web UI
# Run with: podman compose up -d
#
# First-time setup:
#   git clone https://github.com/CRBroughton/git-server-docker src
#   podman compose build
#   podman compose up -d
#
# Add SSH keys: drop public keys into ./keys/, then podman compose restart
# Create repo:  podman exec -it git-server sh -c "cd repos && mkdir <name>.git && cd <name>.git && git init --bare"
# Clone:        git clone ssh://git@git-server.tail538465.ts.net:2222/repos/<name>.git

services:
  tailscale-git-server:
    image: tailscale/tailscale:latest
    container_name: tailscale-git-server
    hostname: git-server
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ./tailscale:/var/lib/tailscale:Z
      - ./serve.json:/config/serve.json:ro,Z
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

  git-server:
    build:
      context: ./src
      dockerfile: Dockerfile
    container_name: git-server
    restart: unless-stopped
    network_mode: service:tailscale-git-server
    depends_on:
      - tailscale-git-server
    environment:
      TZ: Europe/London
    volumes:
      - ./keys:/home/git/.ssh/authorized_keys.d:Z
      - ./repos:/repos:Z