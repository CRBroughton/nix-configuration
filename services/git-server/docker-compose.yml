version: "3.1"

services:
  tailscale-git-server:
    image: tailscale/tailscale:latest
    container_name: tailscale-git-server
    hostname: git-server
    restart: unless-stopped
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATE_DIR=/var/lib/tailscale
      - TS_SERVE_CONFIG=/config/serve.json
    volumes:
      - ./tailscale:/var/lib/tailscale:Z
      - ./serve.json:/config/serve.json:ro,Z
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    devices:
      - /dev/net/tun:/dev/net/tun

  soft-serve:
    image: charmcli/soft-serve:latest
    container_name: soft-serve
    restart: unless-stopped
    network_mode: service:tailscale-git-server
    depends_on:
      - tailscale-git-server
    environment:
      SOFT_SERVE_INITIAL_ADMIN_KEYS: "${SOFT_SERVE_ADMIN_KEY}"
      SOFT_SERVE_SSH_LISTEN_ADDR: ":22"
    volumes:
      - ./data:/soft-serve:Z
